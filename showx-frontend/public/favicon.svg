<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Ultra-Luxurious Metallic Amber & Gold Gradient -->
    <linearGradient id="cinemaGold" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="35%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>
    
    <!-- Premium Hollywood Accent Glow Shadow -->
    <filter id="boxOfficeGlow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2" flood-color="#d97706" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Ticket Stub Body Base with Iconic Inward Side Cutouts -->
  <g filter="url(#boxOfficeGlow)">
    <path d="M4 6C4 4.89543 4.89543 4 6 4H26C27.1046 4 28 4.89543 28 6V12C26.3431 12 25 13.3431 25 15C25 16.6569 26.3431 18 28 18V24C28 25.1046 27.1046 26 26 26H6C4.89543 26 4 25.1046 4 24V18C5.65685 18 7 16.6569 7 15C7 13.3431 5.65685 12 4 12V6Z" 
          fill="url(#cinemaGold)" />
    
    <!-- Fine Micro-Perforations / Theater Ticket Foil Line Entry -->
    <line x1="10" y1="8" x2="10" y2="22" stroke="#060911" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.4" />
    
    <!-- Crisp Central Play Projection Vector (Tells the user it's a Movie/Stream Platform immediately) -->
    <polygon points="14,11 21,15 14,19" fill="#060911" />
    <polygon points="14.5,12 20,15 14.5,18" fill="#ffffff" opacity="0.95" />
  </g>
</svg>
